<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <fieldset>
            <legend>FORMULARIO PARA LOS ESTUDIANTES</legend>
            <input type="text" name="" id="" placeholder="Ingrese su Nombre" required><div></div>
            <input type="number" name="" id="" placeholder="Ingrese su Edad" required><div></div>
            <input type="text" name="" id="" placeholder="Ingrese su curso" required><div></div><p></p>
            <legend>Dispositivo que usa con mayor frecuencia</legend>

            <label for="computadora">Computadora</label>
            <input type="radio" name="dispositivo" id="computadora">

            <label for="celular">celular</label>
            <input type="radio" name="dispositivo" id="celular">

            <label for="tablet">Tablet</label>
            <input type="radio" name="dispositivo" id="tablet">
            <div></div><p></p>

            <legend>Actividad que realiza con Tecnologia</legend>
            <label for="estudiar">Estudiar</label>
            <input type="checkbox" name="Actividad" id="estudiar">

            <label for="jugar">Jugar</label>
            <input type="checkbox" name="Actividad" id="jugar">

            <label for="Redes">Redes Sociales</label>
            <input type="checkbox" name="Actividad" id="Redes">

            <label for="Programar">Programar</label>
            <input type="checkbox" name="Actividad" id="Programar">

            <label for="Videos">Ver Videos</label>
            <input type="checkbox" name="Actividad" id="Videos">
            <div></div><p></p>

            <label for="1">Horas promedio de uso por dia</label>
            <select name="Horas promedio de uso por dia" id="1">
                
                <option value="1">Menos de 1 Hora</option>
                <option value="2">1 a 3 Horas</option>
                <option value="3">3 a 5 Horas</option>
                <option value="4">Mas de 5 Horas</option>
            </select>
            <div><p></p></div>

            <label for="2">Opinion sobre la Tecnologia</label><div></div>
            <textarea name="opinion" id=""></textarea><div></div>

            <input type="submit" name="" id="">


        </fieldset>
        
    </form>
    
</body>
</html>
