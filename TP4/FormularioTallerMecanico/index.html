<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <fieldset>
            <legend>FORMULARIO WEB PARA CLIENTES DE NUESTRO TALLER MECANICO </legend>
            <input type="text" name="" id="" placeholder="Ingrese su nombre" required><div></div>
            <input type="tel" name="telefono" id="telefono" placeholder="telefono"><div></div>
            <input type="email" name="email" id="email" placeholder="Ingrese su correo"><div></div>
            <legend>AUTO-SERVICIO</legend>
            <input type="text" name="marcadeveiculo" id="marcaDeVehiculo" placeholder="Ingrese la marca de su vehiculo" required>
            <input type="text" name="modelodeveheculo" id="modelodeveheculo" placeholder="Ingrese el modelo del vehiculo" requerid>
            <p>Servicio requerido</p>
            <label for="CambiodeAceite">Cambio de Aceite</label>
            <input type="radio" name="Servicios" id="CambiodeAceite" >

            <label for="RevicionGeneral">Revicion General</label>
            <input type="radio" name="Servicios" id="RevicionGeneral">

            <label for="Frenos">Frenos</label>
            <input type="radio" name="Servicios" id="Frenos">

            <label for="Otro">Otro</label>
            <input type="radio" name="Servicios" id="Otro">

            <p>Otro Servicio</p>
            <label for="LavadodelVehiculo">Lavado del Vehiculo</label>
            <input type="checkbox" name="Otro" id="LavadodelVehiculo">

            <label for="RevisionElectrica">Revision Electrica</label>
            <input type="checkbox" name="Otro" id="RevisionElectrica">

            <label for="DiagnosticoComputarizado">Diagnóstico computarizado</label>
            <input type="checkbox" name="Otro" id="DiagnosticoComputarizado"><div></div>

            <label for="fecha">Fecha deseada para el turno</label>
            <input type="date" name="" id="fecha" ><div></div>

            <textarea name="problema" id="" placeholder="Descripcion del problema" required minlength="10"></textarea><div></div>

            <input type="submit" name="envio" id="">




        </fieldset>
        

    </form>
    
</body>
</html>
